<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mapick — Bo3 Map Veto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Chivo:ital,wght@0,400;0,600;0,700;1,700;1,900&family=Chivo+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-glow"></div>

  <header class="site-header">
    <h1>ma<span class="word-map">pick</span></h1>
    <p class="subtitle">Best-of-3 Map Veto</p>
  </header>

  <main>
    <!-- Setup screen -->
    <section id="setup" class="panel">
      <h2 class="panel-title">Match Setup</h2>
      <div class="team-inputs">
        <label class="team-field team-a">
          <span class="team-tag">Team 1</span>
          <input id="team1Name" type="text" maxlength="24" placeholder="Enter team name" />
        </label>
        <div class="vs">VS</div>
        <label class="team-field team-b">
          <span class="team-tag">Team 2</span>
          <input id="team2Name" type="text" maxlength="24" placeholder="Enter team name" />
        </label>
      </div>

      <div id="coinArea" class="coin-area hidden">
        <div id="coin" class="coin" title="Click to re-toss">
          <div class="coin-face coin-heads">1</div>
          <div class="coin-face coin-tails">2</div>
        </div>
        <p id="tossResult" class="toss-result"></p>
      </div>

      <button id="tossBtn" class="btn-primary">Coin Toss</button>
      <button id="startBtn" class="btn-primary hidden">Start Veto</button>
    </section>

    <!-- Veto screen -->
    <section id="veto" class="panel hidden">
      <div class="status-bar">
        <div id="actorBadge" class="actor-badge">Team A</div>
        <p id="instruction" class="instruction">Ban a map</p>
      </div>

      <ol id="stepList" class="step-list"></ol>

      <div id="mapGrid" class="map-grid"></div>

      <!-- Side selection overlay -->
      <div id="sidePicker" class="side-picker hidden">
        <div class="side-buttons">
          <button class="btn-side attack" data-side="Attack">
            <span class="side-icon">⚔</span> Attack
          </button>
          <button class="btn-side defense" data-side="Defense">
            <span class="side-icon">🛡</span> Defense
          </button>
        </div>
      </div>
    </section>

    <!-- Result screen -->
    <section id="result" class="panel hidden">
      <h2 class="panel-title">Veto Complete</h2>
      <div id="resultMaps" class="result-maps"></div>
      <div class="result-actions">
        <button id="copyBtn" class="btn-secondary">Copy Result</button>
        <button id="resetBtn" class="btn-primary">New Veto</button>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p class="disclaimer">Unofficial fan tool. Not affiliated with Riot Games.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
